name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v1.1.0
        with:
          card: stats
          options: "username=josemoura212&show_icons=true&theme=chartreuse-dark&include_all_commits=true&count_private=true"
          path: profile/stats.svg
          token: ${{ secrets.PAT_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v1.1.0
        with:
          card: top-langs
          options: "username=josemoura212&layout=compact&langs_count=7&theme=chartreuse-dark"
          path: profile/top-langs.svg
          token: ${{ secrets.PAT_TOKEN }}

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          USERNAME: josemoura212
          BRANCH_NAME: main
          UTC_OFFSET: -3
          EXCLUDE: ""
          AUTO_PUSH: false

      - name: Commit all cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg profile-summary-card-output/
          git commit -m "chore: atualiza cards de estatísticas" || exit 0
          git push
